# Management Expense Category Definitions
# ========================================
# Maps each expense category to GL accounts, cost centre, and cost driver.
#
# Cost driver types:
#   per_policy:  annual_rate_per_unit x policy_count / 12
#   per_member:  annual_rate_per_unit x member_count / 12
#   pct_nep:     annual_rate_per_unit x monthly_nep  (rate is a fraction)
#   fixed:       annual_rate_per_unit / 12
#
# Benchmark target: ~10.2% MER on ~$188M NEP for ~60K policies / ~130K members
# Source: APRA PHI Statistics FY2022-23, nib Holdings FY2024 Annual Report

categories:
  # ---- PERSONNEL (48% of total) ----------------------------------------
  - category_id: personnel_salaries
    description: "Salaries and wages"
    cost_driver: per_policy
    annual_rate_per_unit: 110.00
    debit_account_code: "6100-01"     # Salaries and Wages
    credit_account_code: "1100-01"    # Cash at Bank - Operating
    cost_centre_code: "CC-300"        # Operations Division

  - category_id: personnel_superannuation
    description: "Superannuation contributions (11.5% SG)"
    cost_driver: per_policy
    annual_rate_per_unit: 12.65
